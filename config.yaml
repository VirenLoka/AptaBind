# ─────────────────────────────────────────────────────────────────────────────
# AptaBind — configuration
# All hyperparameters for dataset, model, training and inference live here.
# ─────────────────────────────────────────────────────────────────────────────

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  pickle_path:    "data/nt_embeddings/mean_pooled.pkl"   # output of gen_embeddings.py
  positive_label: "1"                   # label string that maps to class 1
  train_ratio:    0.80
  val_ratio:      0.10
  test_ratio:     0.10
  stratify:       true                  # stratified split preserves class ratio
  seed:           42

# ── DataLoader ────────────────────────────────────────────────────────────────
dataloader:
  batch_size:    64
  num_workers:   4      # set to 0 on Windows or if you see multiprocessing errors
  pin_memory:    true
  shuffle_train: true

# ── Model ─────────────────────────────────────────────────────────────────────
# ViT-style patch transformer operating on flat NT embeddings.
#
#   embed_dim must be divisible by num_patches
#   d_model   must be divisible by nhead
#
#   embed_dim=1280, num_patches=16  →  patch_size = 80
#   d_model=256,    nhead=8         →  head_dim   = 32
model:
  embed_dim:       1280   # hidden size from gen_embeddings.py (NT 500m = 1280)
  num_patches:     16     # splits the 1280-dim vector into 16 × 80-dim patches
  d_model:         256    # transformer hidden dim (patch projection target)
  nhead:           8      # number of self-attention heads
  num_layers:      4      # number of TransformerEncoderLayer blocks
  dim_feedforward: 512    # FFN inner dimension
  dropout:         0.1

# ── Training ──────────────────────────────────────────────────────────────────
training:
  epochs:           100
  learning_rate:    1.0e-4
  weight_decay:     1.0e-5
  optimizer:        "adamw"    # adamw | adam | sgd
  scheduler:        "cosine"   # cosine (with warmup) | step | none
  warmup_epochs:    5
  step_size:        20         # used only when scheduler=step
  gamma:            0.5        # used only when scheduler=step
  grad_clip:        1.0        # max gradient norm (0 = disabled)

  # Loss function
  # Focal loss handles the 24:1 class imbalance by down-weighting easy negatives
  # rather than up-weighting positives, which avoids aggressive class reweighting.
  #   focal_alpha : balances positive vs. negative contribution  (0.25 = Lin et al. 2017)
  #   focal_gamma : focusing strength  (2.0 = standard; higher = more focus on hard examples)
  # Set loss: "bce" to fall back to plain BCEWithLogitsLoss (no weighting).
  loss:             "focal"
  focal_alpha:      0.25
  focal_gamma:      2.0

  checkpoint_dir:   "checkpoints"
  best_metric:      "auc"      # metric used to select the best checkpoint
                               # options: auc | auprc | val_loss | accuracy | f1

  log_every_n_batches: 100
  early_stopping_patience: 15

# ── Inference ────────────────────────────────────────────────────────────────
inference:
  checkpoint_path: "checkpoints/best_model.pt"
  input_pickle:    "nt_embeddings.pkl"  # can be a new unseen pickle file
  output_csv:      "predictions.csv"
  threshold:       0.5                  # sigmoid probability threshold for class 1

# ── Enrich (RL aptamer optimizer) ────────────────────────────────────────────
# Drives a PPO loop that mutates a parent DNA aptamer to maximise:
#     reward = α · binder_confidence + β · plausibility
# where binder_confidence is sigmoid(AptamerClassifier(NT_mean_pool(seq))).
enrich:
  # ── Run setup ─────────────────────────────────────────────────────────────
  run_dir:           "runs"                       # base dir; timestamped subdir is created automatically
  classifier_ckpt:   "checkpoints/best_model.pt"  # AptamerClassifier checkpoint (from train.py)
  parent_sequence:   null                          # null → random parent; else explicit DNA string
  parent_length:     35                            # used when parent_sequence is null
  mutable_positions: null                          # null → all positions mutable; else list of ints
  seed:              42

  # ── NT embedder (frozen, used for reward computation) ─────────────────────
  nt:
    model_id:        "InstaDeepAI/nucleotide-transformer-500m-1000g"
    layer:           -1
    max_length:      128
    embed_batch:     32       # batch size for NT forward (memory-sensitive)

  # ── Reward function ───────────────────────────────────────────────────────
  reward:
    confidence_weight:   0.7    # weight on classifier binder probability
    plausibility_weight: 0.3    # weight on DNA plausibility score
    use_delta:           true   # report reward as delta over parent (gives clear gradient)
    delta_scale:         5.0    # amplification for delta rewards

    # Plausibility component thresholds
    plaus:
      min_length:       30
      max_length:       40
      gc_low:           0.20
      gc_high:          0.80
      max_run:          5       # homopolymer run length cap
      max_composition:  0.50    # max single-base fraction
      entropy_min:      1.4     # Shannon entropy floor (max for DNA = log2(4) = 2.0)

  # ── MutationProposer architecture ─────────────────────────────────────────
  proposer:
    d_model:           256
    n_heads:           8
    n_enc_layers:      4
    d_ff:              512
    max_mutations:     5        # max bases mutated per rollout
    min_mutations:     1        # min bases mutated before stop is allowed
    neighborhood_k:    8        # cross-attention window in NucleotideSelector
    dropout:           0.1

  # ── Value network (critic) ────────────────────────────────────────────────
  critic:
    d_hidden:          512

  # ── PPO hyperparameters ───────────────────────────────────────────────────
  ppo:
    n_iterations:        200
    n_rollout_steps:     4
    rollout_batch_size:  16
    ppo_epochs:          4
    minibatch_size:      16
    lr_policy:           3.0e-4
    lr_critic:           1.0e-3
    clip_eps:            0.2
    entropy_coef:        0.05
    value_coef:          0.5
    max_grad_norm:       1.0
    pos_temp:            1.5
    nt_temp:             1.5
    entropy_decay:       0.9995
    entropy_min:         0.005

  # ── Logging + checkpointing ───────────────────────────────────────────────
  save_every:          25       # save last_checkpoint.pt every N iterations
  log_every:           1        # print step panel every N iterations
  top_k_sequences:     20       # number of best sequences to dump to CSV
